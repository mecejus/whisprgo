name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build
    runs-on: macos-15

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -ldflags="-s -w" -o whisprgo .

      - name: Package
        run: |
          tar czf whisprgo-darwin-arm64.tar.gz whisprgo
          shasum -a 256 whisprgo-darwin-arm64.tar.gz \
            | awk '{print $1}' > whisprgo-darwin-arm64.sha256

      - uses: actions/upload-artifact@v6
        with:
          name: dist
          path: |
            whisprgo-darwin-arm64.tar.gz
            whisprgo-darwin-arm64.sha256

  release:
    name: Publish
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/download-artifact@v7
        with:
          name: dist
          path: dist

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --generate-notes \
            dist/whisprgo-darwin-arm64.tar.gz \
            dist/whisprgo-darwin-arm64.sha256
